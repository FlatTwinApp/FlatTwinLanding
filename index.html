<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlatTwin | Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-a: #D66A5B;
            --brand-b: #CA594B;
            --brand-c: #DB5A49;
            --brand-d: #C94D3F;
            --bg-primary: #EFEAE7;
            --bg-secondary: #EBEBEB;
            --text-main: #2D2D2D;
            --text-light: #ffffff;
            --font-family: 'Inter', sans-serif;
        }

        /* Reseteo básico y fuentes */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: var(--font-family);
            /* Gradiente de 3 puntos para más profundidad */
            background: linear-gradient(135deg, var(--brand-d) 0%, var(--brand-b) 50%, var(--brand-a) 100%);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: hidden;
        }

        /* Capa de ruido sutil para textura */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Barra de navegación superior */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.5rem 2.5rem;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 12px; /* Espacio para el futuro logo */
        }

        nav .logo {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, #ffffff, var(--bg-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Contenedores de pantallas */
        .screen {
            display: none;
            flex: 1;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
            padding: 2rem;
            padding-top: 80px;
            text-align: center;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
        }
        .screen.active {
            display: flex;
        }

        /* Botón común con relieve */
        .btn-relief {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 4px 4px 15px rgba(0,0,0,0.2), inset 1px 1px 3px rgba(255,255,255,0.2);
            border-radius: 30px;
            padding: 1.2rem 3rem;
            color: #fff;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            font-family: var(--font-family);
        }
        .btn-relief:hover {
            transform: translateY(-2px);
            box-shadow: 6px 6px 20px rgba(0,0,0,0.3), inset 1px 1px 3px rgba(255,255,255,0.3);
            background: rgba(255, 255, 255, 0.25);
        }

        /* === PANTALLA 1 === */
        .s1-txt1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 800;
            line-height: 1.1;
            text-shadow: 0px 4px 20px rgba(0,0,0,0.2);
            margin-bottom: 2.5rem;
            opacity: 0;
            transform: translateY(-30px);
        }
        .s1-txt3 {
            font-size: 1.5rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 3.5rem;
            opacity: 0;
            transform: translateY(-30px);
            font-style: italic;
        }
        .s1-btn {
            opacity: 0;
            transform: translateY(-30px);
        }
        
        .animate-down {
            animation: slideDown 1s ease-out forwards;
        }
        @keyframes slideDown {
            to { opacity: 1; transform: translateY(0); }
        }

        /* === PANTALLA 2 === */
        .s2-texts {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 300px;
            margin-bottom: 1rem;
            width: 100%;
        }
        .s2-text {
            font-size: clamp(1.4rem, 5vw, 2rem);
            font-weight: 600;
            margin-top: 1.5rem;
            min-height: 2.4rem;
            width: 100%;
            text-align: center;
        }
        
        /* Typing animation styles */
        .typing-cursor::after {
            content: '|';
            margin-left: 5px;
            color: var(--bg-primary);
            animation: blink 0.7s step-end infinite;
        }
        
        @keyframes blink {
            from, to { opacity: 1 }
            50% { opacity: 0 }
        }

        /* === PANTALLA 3 (Chat) === */
        .phone-silhouette {
            width: 100%;
            max-width: 350px;
            height: 600px;
            border: 6px solid rgba(255,255,255,0.2);
            border-radius: 40px;
            padding: 20px 15px 15px 15px;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.2);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3), 0 20px 50px rgba(0,0,0,0.3);
            position: relative;
            margin: 0 auto;
        }
        .phone-silhouette::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 5px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }
        .chat-header {
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
            margin-top: 15px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .chat-logo {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(to right, #ffffff, var(--bg-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .chat-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
            margin-bottom: 15px;
            padding: 5px;
        }
        .bubble {
            padding: 12px 18px;
            border-radius: 20px;
            max-width: 85%;
            font-size: 1.1rem;
            line-height: 1.4;
            opacity: 0;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }
        .bubble.left {
            align-self: flex-start;
            background: rgba(255,255,255,0.2);
            border-bottom-left-radius: 5px;
            text-align: left;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .bubble.right {
            align-self: flex-end;
            background: var(--brand-c);
            color: white;
            border-bottom-right-radius: 5px;
            text-align: right;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 10px 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            width: fit-content;
            align-self: flex-start;
        }
        .typing-indicator span {
            width: 6px; height: 6px;
            background: #fff;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        
        .chat-footer {
            margin-top: auto;
            display: flex;
            justify-content: center;
        }

        .chat-action-btn {
            width: 100%;
            background: var(--brand-c);
            color: #ffffff;
            border: none;
            padding: 18px 20px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(219, 90, 73, 0.4);
            transition: all 0.2s ease;
            font-family: var(--font-family);
            opacity: 0;
            transform: translateY(20px);
        }

        .chat-action-btn:hover {
            background: var(--brand-d);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(219, 90, 73, 0.6);
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes slideUpFadeIn {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* === PANTALLA 4 === */
        .s4-title {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 800;
            margin-bottom: 2rem;
            text-shadow: 0px 4px 20px rgba(0,0,0,0.2);
        }
        .form-container {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: clamp(1.5rem, 5vw, 2.5rem);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            animation: fadeIn 1s;
        }
        .input-wrapper {
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }
        .input-wrapper label {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.95);
            margin-left: 0.5rem;
        }
        .form-container input {
            width: 100%;
            padding: 1rem 1.2rem;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.1);
            font-family: var(--font-family);
        }
        .form-container input::placeholder {
            color: rgba(255,255,255,0.6);
        }
        .s4-btn {
            margin-top: 0.5rem;
            background: var(--brand-c);
            color: #ffffff;
            width: 100%;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(219, 90, 73, 0.4);
            font-size: 1.3rem;
        }
        .s4-btn:hover {
            background: var(--brand-d);
            box-shadow: 0 6px 20px rgba(219, 90, 73, 0.6);
        }

        #success-msg {
            display: none;
            margin-top: 1.5rem;
            padding: 2.5rem;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: 600;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.8s;
            line-height: 1.4;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Ajustes específicos para móviles */
        @media (max-width: 480px) {
            nav {
                padding: 1rem 1.5rem;
            }
            nav .logo {
                font-size: 1.5rem;
            }
            .screen {
                padding: 1.5rem;
                padding-top: 60px;
            }
            .s1-txt1 {
                margin-bottom: 1.5rem;
            }
            .s1-txt3 {
                font-size: 1.2rem;
                margin-bottom: 2.5rem;
            }
            .btn-relief {
                padding: 1rem 2rem;
                font-size: 1.1rem;
                width: 100%;
            }
            .phone-silhouette {
                height: 500px;
            }
        }
    </style>
</head>

    <!-- PANTALLA 1 -->
    <div id="screen1" class="screen active">
        <h1 class="s1-txt1" id="s1t1">Algunas decisiones<br>lo cambian todo</h1>
        <p class="s1-txt3" id="s1t3">Haz match con tu compañero de piso ideal</p>
        <button class="btn-relief s1-btn" id="s1b" onclick="goToScreen(2)">Quiero entrar</button>
    </div>

    <!-- PANTALLA 2 -->
    <div id="screen2" class="screen">
        <div class="s2-texts">
            <div class="s2-text" id="s2t1"></div>
            <div class="s2-text" id="s2t2"></div>
            <div class="s2-text" id="s2t3"></div>

    </div>

    <!-- PANTALLA 4 -->

    <script>
        // Iniciar animación de Pantalla 1
        window.onload = () => {
            setTimeout(() => document.getElementById('s1t1').classList.add('animate-down'), 200);
            setTimeout(() => document.getElementById('s1t3').classList.add('animate-down'), 1200);
            setTimeout(() => document.getElementById('s1b').classList.add('animate-down'), 2000);
        };

        // Cambio entre pantallas
        function goToScreen(num) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen' + num).classList.add('active');

            if (num === 2) {
                animateScreen2();
            } else if (num === 3) {
                animateScreen3();
            }
        }

        // Animación Pantalla 2 (Typing Effect mejorado para móvil)
        async function typeWriter(el, text) {
            el.innerHTML = "";
            el.classList.add('typing-cursor');
            
            for (let i = 0; i <= text.length; i++) {
                el.innerHTML = text.substring(0, i);
                // Velocidad variable para efecto más humano
                await new Promise(r => setTimeout(r, 30 + Math.random() * 40));
            }
            
            await new Promise(r => setTimeout(r, 500));
            el.classList.remove('typing-cursor');
        }

        async function animateScreen2() {
            // Limpiar textos previos por si acaso
            document.getElementById('s2t1').innerHTML = "";
            document.getElementById('s2t2').innerHTML = "";
            document.getElementById('s2t3').innerHTML = "";

            await new Promise(r => setTimeout(r, 500));
            await typeWriter(document.getElementById('s2t1'), "No es lo que estás pensando");
            await new Promise(r => setTimeout(r, 800));
            await typeWriter(document.getElementById('s2t2'), "Y muy probablemente lo vas a necesitar");
            await new Promise(r => setTimeout(r, 800));
            await typeWriter(document.getElementById('s2t3'), "Pero no todavía");
            await new Promise(r => setTimeout(r, 1500));
            goToScreen(3);
        }

        // Animación Pantalla 3
        function animateScreen3() {
            const typing = document.getElementById('typing');
            const msg = document.getElementById('chatMsg');
            const reply = document.getElementById('chatReply');

            setTimeout(() => {
                typing.style.display = 'none';
                msg.style.display = 'block';
                msg.style.animation = 'popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';
                
                setTimeout(() => {
                    reply.style.display = 'block';
                    reply.style.animation = 'slideUpFadeIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';
                }, 1000);
            }, 1500);
        }

        function sendReply() {
            const chatBody = document.getElementById('chatBody');
            const replyBtn = document.getElementById('chatReply');
            
            replyBtn.style.display = 'none';
            
            const userBubble = document.createElement('div');
            userBubble.className = 'bubble right';
            userBubble.innerHTML = "Sí, quiero entrar";
            userBubble.style.opacity = '1';
            userBubble.style.animation = 'popIn 0.3s forwards';
            chatBody.appendChild(userBubble);
            
            chatBody.scrollTop = chatBody.scrollHeight;

            setTimeout(() => {
                goToScreen(4);
            }, 1200);
        }

        // Lógica del Formulario en Pantalla 4
        const form = document.getElementById('leadForm');
        const submitBtn = document.getElementById('submitBtn');
        const successMsg = document.getElementById('success-msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;

            if (!email && !phone) {
                alert('Debes introducir al menos un email o un teléfono para que podamos contactarte.');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = 'Enviando...';

            try {
                const response = await fetch('https://flattwinbackend-production.up.railway.app/api/v1/leads', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, phone }),
                });

                if (response.ok) {
                    form.style.display = 'none';
                    successMsg.style.display = 'block';
                } else {
                    alert('Ups! Algo ha salido mal. Inténtalo de nuevo.');
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Enviar';
                }
            } catch (error) {
                alert('No se ha podido conectar con el servidor.');
                submitBtn.disabled = false;
                submitBtn.innerText = 'Enviar';
            }
        });
    </script>
</body>
</html>
