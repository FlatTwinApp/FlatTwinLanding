<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlatTwin | Coming Soon</title>
    <style>
        /* Reseteo básico y fuentes */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0b192c 0%, #3b0764 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Capa de ruido sutil para textura */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Barra de navegación superior */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.5rem 2.5rem;
            z-index: 10;
            display: flex;
            align-items: center;
        }

        nav .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, #ffffff, #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        /* Contenedor central */
        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            padding-top: 80px;
        }

        .content {
            text-align: center;
            padding: 2rem;
            animation: fadeIn 1s ease-out forwards;
            max-width: 500px;
            width: 100%;
        }

        /* Estilos del título principal (Coming Soon) */
        h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 800;
            letter-spacing: -2px;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            color: #ffffff;
            text-shadow: 0px 4px 30px rgba(0,0,0,0.3);
        }

        /* Subtítulo explicativo */
        p.description {
            font-size: 1.1rem;
            color: #d8b4fe;
            margin-bottom: 2.5rem;
            opacity: 0.9;
            line-height: 1.5;
        }

        /* Formulario de suscripción */
        .subscribe-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            text-align: left;
            gap: 0.5rem;
        }

        .input-group label {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            margin-left: 0.5rem;
        }

        .subscribe-form input {
            width: 100%;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .subscribe-form input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .subscribe-form input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(196, 181, 253, 0.5);
            box-shadow: 0 0 0 4px rgba(196, 181, 253, 0.1);
        }

        .subscribe-form button {
            margin-top: 1rem;
            padding: 1.2rem;
            border-radius: 12px;
            border: none;
            background: #ffffff;
            color: #3b0764;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
        }

        .subscribe-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.3);
            background: #f3f4f6;
        }

        .subscribe-form button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Mensajes de feedback */
        #message {
            margin-top: 1.5rem;
            font-size: 0.95rem;
            border-radius: 12px;
            padding: 1rem;
            display: none;
        }

        #message.success {
            display: block;
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        #message.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* Animación de entrada */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    
    <nav>
        <a href="#" class="logo">FlatTwin</a>
    </nav>
    
    <div class="main-container">
        <div class="content">
            <h1>Coming Soon</h1>
            <p class="description">Encuentra a tu compañero ideal. Únete a la lista de espera exclusiva.</p>
            
            <form class="subscribe-form" id="leadForm">
                <div class="input-group">
                    <label for="name">Nombre Completo*</label>
                    <input type="text" id="name" name="name" placeholder="Ej. Juan Pérez" required>
                </div>
                
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="tu@email.com">
                </div>

                <div class="input-group">
                    <label for="phone">Teléfono móvil</label>
                    <input type="tel" id="phone" name="phone" placeholder="600 000 000">
                </div>
                
                <button type="submit" id="submitBtn">Unirme a la lista</button>
            </form>

            <div id="message"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('leadForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;

            // Validación mínima: al menos email o teléfono
            if (!email && !phone) {
                showMessage('Debes introducir al menos un email o un teléfono para que podamos contactarte.', 'error');
                return;
            }

            // Bloquear botón
            submitBtn.disabled = true;
            submitBtn.innerText = 'Enviando...';
            messageDiv.style.display = 'none';

            try {
                // Cambia esta URL por la de tu backend real en producción
                const response = await fetch('https://flattwinbackend-production.up.railway.app/api/v1/leads', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ name, email, phone }),
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('¡Genial! Ya estás en la lista. Te avisaremos pronto.', 'success');
                    form.reset();
                } else {
                    showMessage(data.message || 'Ups! Algo ha salido mal. Inténtalo de nuevo.', 'error');
                }
            } catch (error) {
                showMessage('No se ha podido conectar con el servidor. Revisa tu conexión.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Unirme a la lista';
            }
        });

        function showMessage(text, type) {
            messageDiv.innerText = text;
            messageDiv.className = type;
            messageDiv.style.display = 'block';
        }
    </script>
</body>
</html>
